<div class="space-y-6">

  <div>
    <h1 class="text-3xl font-bold">
      AI Insights
    </h1>

    <p class="text-slate-500 mt-2">
      Smart analysis of your spending habits
    </p>
  </div>

  <div class="grid gap-4">

    @for (insight of insights(); track $index) {

      <div
        class="bg-white rounded-xl shadow p-5 border-l-4 border-indigo-500">

        <div class="flex items-start gap-3">

          <span class="text-2xl">
            🤖
          </span>

          <p class="text-slate-700">
            {{ insight }}
          </p>

        </div>

      </div>

    }

  </div>

</div>
